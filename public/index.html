
<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سالم تك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #registerScreen {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        #registerScreen h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group label i {
            margin-left: 8px;
            color: #667eea;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #registerBtn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        #registerBtn:hover {
            transform: scale(1.02);
        }
        
        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            background: #f5f7fb;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 300px;
            background: white;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        
        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .sidebar-header i {
            margin-left: 5px;
        }
        
        .online-count {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s;
        }
        
        .user-item:hover {
            background: #e9ecef;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-left: 12px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        
        .user-id {
            font-size: 11px;
            color: #999;
        }
        
        .online-indicator {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 5px;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .chat-header h1 i {
            color: #667eea;
            margin-left: 10px;
        }
        
        .my-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .my-id {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .my-id i {
            color: #667eea;
            margin-left: 5px;
        }
        
        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .logout-btn i {
            margin-left: 5px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message-wrapper {
            margin-bottom: 15px;
            display: flex;
        }
        
        .my-message {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 12px;
        }
        
        .message-sender {
            font-weight: bold;
            margin-left: 10px;
        }
        
        .message-time {
            color: #999;
            font-size: 11px;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .my-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .other-message .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .message-image {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 5px;
        }
        
        .message-audio {
            margin-top: 5px;
        }
        
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-actions {
            display: flex;
            gap: 5px;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            color: #667eea;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .action-btn.recording {
            background: #ff4757;
            color: white;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .send-btn:hover {
            transform: scale(1.1);
        }
        
        .footer {
            text-align: center;
            padding: 10px;
            background: white;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #e0e0e0;
        }
        
        .footer i {
            color: #ff4757;
        }
        
        .system-message {
            text-align: center;
            margin: 15px 0;
        }
        
        .system-message span {
            background: rgba(0,0,0,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="registerScreen">
        <div class="logo">
            <i class="fas fa-comments"></i>
        </div>
        <h2>مرحباً بك في سالم تك</h2>
        <p class="subtitle">أدخل اسمك الحقيقي للمرة الأولى فقط</p>
        
        <div class="input-group">
            <label><i class="fas fa-user"></i> الاسم الحقيقي</label>
            <input type="text" id="realNameInput" placeholder="اكتب اسمك هنا">
        </div>
        
        <button id="registerBtn" onclick="register()">
            <i class="fas fa-arrow-left"></i> دخول
        </button>
    </div>

    <div id="chatScreen">
        <div class="chat-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3><i class="fas fa-users"></i> المتصلون</h3>
                    <div class="online-count" id="onlineCount">0 متصل</div>
                </div>
                <div class="users-list" id="usersList"></div>
            </div>
            
            <div class="main-chat">
                <div class="chat-header">
                    <h1><i class="fas fa-comment-dots"></i> سالم تك</h1>
                    <div class="my-info">
                        <span class="my-id" id="myIdDisplay"><i class="fas fa-id-card"></i> <span id="userIdText"></span></span>
                        <span id="myNameDisplay" style="font-weight: bold;"></span>
                        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                    </div>
                </div>
                
                <div class="messages-area" id="messagesArea"></div>
                
                <div class="input-area">
                    <div class="input-container">
                        <div class="input-actions">
                            <button class="action-btn" onclick="triggerImageUpload()">
                                <i class="fas fa-image"></i>
                            </button>
                            <button class="action-btn" id="voiceBtn" onclick="toggleVoiceRecording()">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        </div>
                        
                        <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off">
                        
                        <button class="send-btn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                
                <div class="footer">
                    <i class="fas fa-heart"></i> من تطوير سالم <i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let currentUser = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        const registerScreen = document.getElementById('registerScreen');
        const chatScreen = document.getElementById('chatScreen');
        const realNameInput = document.getElementById('realNameInput');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const usersList = document.getElementById('usersList');
        const onlineCount = document.getElementById('onlineCount');
        const myNameDisplay = document.getElementById('myNameDisplay');
        const userIdText = document.getElementById('userIdText');
        const voiceBtn = document.getElementById('voiceBtn');
        
        function generateUserId(name) {
            const timestamp = Date.now().toString(36);
            const random = Math.random().toString(36).substring(2, 6);
            const nameHash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0).toString(36);
            return (nameHash + timestamp + random).substring(0, 8).toUpperCase();
        }
        
        function register() {
            const realName = realNameInput.value.trim();
            
            if (!realName) {
                alert('الرجاء إدخال اسمك');
                return;
            }
            
            socket.emit('check name', realName, (exists) => {
                if (exists) {
                    alert('هذا الاسم مسجل مسبقاً');
                    return;
                }
                
                currentUser = {
                    id: generateUserId(realName),
                    name: realName
                };
                
                localStorage.setItem('salemUser', JSON.stringify(currentUser));
                
                socket.emit('user join', currentUser);
                
                myNameDisplay.textContent = realName;
                userIdText.textContent = currentUser.id;
                
                registerScreen.style.display = 'none';
                chatScreen.style.display = 'block';
                
                addSystemMessage(`✨ أهلاً ${realName}!`);
            });
        }
        
        function logout() {
            if (currentUser) {
                socket.emit('user leave', currentUser);
                localStorage.removeItem('salemUser');
            }
            currentUser = null;
            registerScreen.style.display = 'block';
            chatScreen.style.display = 'none';
            realNameInput.value = '';
            messagesArea.innerHTML = '';
        }
        
        function checkAutoLogin() {
            const savedUser = localStorage.getItem('salemUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                socket.emit('user join', currentUser);
                
                myNameDisplay.textContent = currentUser.name;
                userIdText.textContent = currentUser.id;
                
                registerScreen.style.display = 'none';
                chatScreen.style.display = 'block';
                
                addSystemMessage(`✨ مرحباً بعودتك ${currentUser.name}!`);
            }
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentUser) {
                const messageData = {
                    userId: currentUser.id,
                    userName: currentUser.name,
                    text: text,
                    type: 'text',
                    timestamp: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
                };
                socket.emit('chat message', messageData);
                messageInput.value = '';
            }
        }
        
        function triggerImageUpload() {
            document.getElementById('imageInput').click();
        }
        
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file && currentUser) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const messageData = {
                        userId: currentUser.id,
                        userName: currentUser.name,
                        image: e.target.result,
                        type: 'image',
                        timestamp: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
                    };
                    socket.emit('chat message', messageData);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }
        
        async function toggleVoiceRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const messageData = {
                                userId: currentUser.id,
                                userName: currentUser.name,
                                audio: e.target.result,
                                type: 'audio',
                                timestamp: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
                            };
                            socket.emit('chat message', messageData);
                        };
                        reader.readAsDataURL(audioBlob);
                        
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('recording');
                    voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
                } catch (error) {
                    alert('لا يمكن الوصول إلى الميكروفون');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            }
        }
        
        function addMessage(data) {
            const isMyMessage = currentUser && data.userId === currentUser.id;
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isMyMessage ? 'my-message' : 'other-message'}`;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `
                <span class="message-sender">${isMyMessage ? 'أنت' : data.userName}</span>
                <span class="message-time">${data.timestamp}</span>
            `;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (data.type === 'text') {
                bubble.textContent = data.text;
            } else if (data.type === 'image') {
                const img = document.createElement('img');
                img.src = data.image;
                img.className = 'message-image';
                bubble.appendChild(img);
            } else if (data.type === 'audio') {
                const audio = document.createElement('audio');
                audio.src = data.audio;
                audio.controls = true;
                audio.className = 'message-audio';
                bubble.appendChild(audio);
            }
            
            content.appendChild(header);
            content.appendChild(bubble);
            wrapper.appendChild(content);
            messagesArea.appendChild(wrapper);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.innerHTML = `<span><i class="fas fa-info-circle"></i> ${text}</span>`;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function updateUsersList(users) {
            const userArray = Array.from(users.values());
            onlineCount.textContent = `${userArray.length} متصل`;
            
            usersList.innerHTML = '';
            userArray.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                userDiv.innerHTML = `
                    <div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>
                    <div class="user-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-id">#${user.id}</div>
                    </div>
                    <div class="online-indicator"></div>
                `;
                usersList.appendChild(userDiv);
            });
        }
        
        socket.on('connect', () => {
            checkAutoLogin();
        });
        
        socket.on('chat message', (data) => {
            addMessage(data);
        });
        
        socket.on('users update', (users) => {
            updateUsersList(users);
        });
        
        socket.on('user joined', (user) => {
            addSystemMessage(`👋 ${user.name} انضم`);
        });
        
        socket.on('user left', (user) => {
            addSystemMessage(`👋 ${user.name} غادر`);
        });
        
        socket.on('name exists', () => {
            alert('هذا الاسم مسجل مسبقاً');
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
