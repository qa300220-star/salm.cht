<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سالم تك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #registerScreen {
            background: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        
        .logo {
            font-size: 50px;
            color: #075e54;
            margin-bottom: 15px;
        }
        
        #registerScreen h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 26px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-group label i {
            margin-left: 8px;
            color: #075e54;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            text-align: right;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #075e54;
        }
        
        #registerBtn {
            width: 100%;
            padding: 15px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        #registerBtn:hover {
            transform: scale(1.02);
        }
        
        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            background: #e5ddd5;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 18px;
            background: #075e54;
            color: white;
            text-align: center;
        }
        
        .sidebar-header h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .online-count {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #075e54;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-left: 12px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
            font-size: 14px;
        }
        
        .user-id {
            font-size: 10px;
            color: #999;
        }
        
        .online-indicator {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
        }
        
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-header h1 {
            font-size: 20px;
        }
        
        .my-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .my-id {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVUAAAABmJLR0QA/wD/AP+gvaeTAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH4QYDFSkFGaVrUwAAAB1pVFh0Q29tbWVudAAAAAAAQ3JlYXRlZCB3aXRoIEdJTVBkLmUHAAAAI0lEQVR42u3QMQEAAAjDMMC/50EYSqgTTUybNm3atGnTpk0DAADAjwAEAAHFAcAAAAAASUVORK5CYII=');
        }
        
        .message-wrapper {
            margin-bottom: 12px;
            display: flex;
        }
        
        .my-message {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 75%;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            font-size: 12px;
        }
        
        .my-message .message-header {
            justify-content: flex-end;
        }
        
        .message-sender {
            font-weight: bold;
            margin-left: 8px;
            color: #555;
        }
        
        .message-time {
            color: #999;
            font-size: 10px;
        }
        
        .message-bubble {
            padding: 10px 14px;
            border-radius: 8px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .my-message .message-bubble {
            background: #dcf8c6;
            border-top-right-radius: 0;
        }
        
        .other-message .message-bubble {
            background: white;
            border-top-left-radius: 0;
        }
        
        .message-image {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 5px;
        }
        
        .message-audio {
            margin-top: 5px;
            max-width: 200px;
        }
        
        .input-area {
            background: #f0f0f0;
            padding: 12px;
            border-top: 1px solid #ddd;
        }
        
        .input-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-actions {
            display: flex;
            gap: 5px;
        }
        
        .action-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: white;
            color: #075e54;
            font-size: 18px;
            cursor: pointer;
        }
        
        .action-btn.recording {
            background: #ff4757;
            color: white;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        #messageInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: white;
        }
        
        #messageInput:focus {
            outline: none;
        }
        
        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #075e54;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            padding: 8px;
            background: #f0f0f0;
            color: #666;
            font-size: 11px;
            border-top: 1px solid #ddd;
        }
        
        .system-message {
            text-align: center;
            margin: 10px 0;
        }
        
        .system-message span {
            background: rgba(225,245,254,0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="registerScreen">
        <div class="logo">
            <i class="fas fa-comments"></i>
        </div>
        <h2>سالم تك</h2>
        <p class="subtitle">أدخل اسمك للمرة الأولى</p>
        
        <div class="input-group">
            <label><i class="fas fa-user"></i> الاسم</label>
            <input type="text" id="realNameInput" placeholder="اكتب اسمك">
        </div>
        
        <button id="registerBtn" onclick="register()">
            <i class="fas fa-arrow-left"></i> دخول
        </button>
    </div>

    <div id="chatScreen">
        <div class="chat-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3><i class="fas fa-users"></i> المتصلون</h3>
                    <div class="online-count" id="onlineCount">0</div>
                </div>
                <div class="users-list" id="usersList"></div>
            </div>
            
            <div class="main-chat">
                <div class="chat-header">
                    <h1><i class="fas fa-comment-dots"></i> سالم تك</h1>
                    <div class="my-info">
                        <span class="my-id" id="myIdDisplay"><i class="fas fa-id-card"></i> <span id="userIdText"></span></span>
                        <span id="myNameDisplay" style="font-weight: bold;"></span>
                        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                    </div>
                </div>
                
                <div class="messages-area" id="messagesArea"></div>
                
                <div class="input-area">
                    <div class="input-container">
                        <div class="input-actions">
                            <button class="action-btn" onclick="triggerImageUpload()">
                                <i class="fas fa-image"></i>
                            </button>
                            <button class="action-btn" id="voiceBtn" onclick="toggleVoiceRecording()">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        </div>
                        
                        <input type="text" id="messageInput" placeholder="اكتب رسالة..." autocomplete="off">
                        
                        <button class="send-btn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                
                <div class="footer">
                    <i class="fas fa-heart"></i> من تطوير سالم <i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let currentUser = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        const registerScreen = document.getElementById('registerScreen');
        const chatScreen = document.getElementById('chatScreen');
        const realNameInput = document.getElementById('realNameInput');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const usersList = document.getElementById('usersList');
        const onlineCount = document.getElementById('onlineCount');
        const myNameDisplay = document.getElementById('myNameDisplay');
        const userIdText = document.getElementById('userIdText');
        const voiceBtn = document.getElementById('voiceBtn');
        
        function generateUserId(name) {
            const timestamp = Date.now().toString(36);
            const random = Math.random().toString(36).substring(2, 6);
            const nameHash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0).toString(36);
            return (nameHash + timestamp + random).substring(0, 8).toUpperCase();
        }
        
        function register() {
            const realName = realNameInput.value.trim();
            
            if (!realName) {
                alert('الرجاء إدخال اسمك');
                return;
            }
            
            socket.emit('check name', realName, (exists) => {
                if (exists) {
                    alert('هذا الاسم مستخدم حالياً');
                    return;
                }
                
                currentUser = {
                    id: generateUserId(realName),
                    name: realName
                };
                
                localStorage.setItem('salemUser', JSON.stringify(currentUser));
                
                socket.emit('user join', currentUser);
                
                myNameDisplay.textContent = realName;
                userIdText.textContent = currentUser.id;
                
                registerScreen.style.display = 'none';
                chatScreen.style.display = 'block';
            });
        }
        
        function logout() {
            if (currentUser) {
                socket.emit('user leave', currentUser);
                localStorage.removeItem('salemUser');
            }
            currentUser = null;
            registerScreen.style.display = 'block';
            chatScreen.style.display = 'none';
            realNameInput.value = '';
            messagesArea.innerHTML = '';
        }
        
        function checkAutoLogin() {
            const savedUser = localStorage.getItem('salemUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                socket.emit('user join', currentUser);
                
                myNameDisplay.textContent = currentUser.name;
                userIdText.textContent = currentUser.id;
                
                registerScreen.style.display = 'none';
                chatScreen.style.display = 'block';
            }
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentUser) {
                socket.emit('chat message', {
                    userId: currentUser.id,
                    userName: currentUser.name,
                    text: text,
                    type: 'text',
                    timestamp: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
                });
                messageInput.value = '';
            }
        }
        
        function triggerImageUpload() {
            document.getElementById('imageInput').click();
        }
        
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file && currentUser) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit('chat message', {
                        userId: currentUser.id,
                        userName: currentUser.name,
                        image: e.target.result,
                        type: 'image',
                        timestamp: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
                    });
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }
        
        async function toggleVoiceRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            socket.emit('chat message', {
                                userId: currentUser.id,
                                userName: currentUser.name,
                                audio: e.target.result,
                                type: 'audio',
                                timestamp: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
                            });
                        };
                        reader.readAsDataURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('recording');
                    voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
                } catch (e) {
                    alert('لا يمكن الوصول للميكروفون');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            }
        }
        
        function addMessage(data) {
            const isMy = currentUser && data.userId === currentUser.id;
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isMy ? 'my-message' : 'other-message'}`;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `<span class="message-sender">${isMy ? 'أنت' : data.userName}</span><span class="message-time">${data.timestamp}</span>`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (data.type === 'text') bubble.textContent = data.text;
            else if (data.type === 'image') { const img = document.createElement('img'); img.src = data.image; img.className = 'message-image'; bubble.appendChild(img); }
            else if (data.type === 'audio') { const audio = document.createElement('audio'); audio.src = data.audio; audio.controls = true; audio.className = 'message-audio'; bubble.appendChild(audio); }
            
            content.appendChild(header);
            content.appendChild(bubble);
            wrapper.appendChild(content);
            messagesArea.appendChild(wrapper);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.innerHTML = `<span><i class="fas fa-info-circle"></i> ${text}</span>`;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function updateUsersList(users) {
            const arr = Array.from(users.values());
            onlineCount.textContent = `${arr.length} متصل`;
            usersList.innerHTML = arr.map(u => `
                <div class="user-item">
                    <div class="user-avatar">${u.name.charAt(0).toUpperCase()}</div>
                    <div class="user-info">
                        <div class="user-name">${u.name}</div>
                        <div class="user-id">#${u.id}</div>
                    </div>
                    <div class="online-indicator"></div>
                </div>
            `).join('');
        }
        
        socket.on('connect', checkAutoLogin);
        socket.on('chat message', addMessage);
        socket.on('users update', updateUsersList);
        socket.on('user joined', (u) => addSystemMessage(`👋 ${u.name} انضم`));
        socket.on('user left', (u) => addSystemMessage(`👋 ${u.name} غادر`));
        socket.on('name exists', () => alert('الاسم مستخدم'));
        
        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
